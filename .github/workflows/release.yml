name: Build, Lint, Test & Deploy

on:
  push:
    branches: [main]
    tags: [v*]
  release:
    types: [published]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install poetry
        run: pip install poetry poetry-dynamic-versioning[plugin]

      - name: Install dependencies
        run: poetry install

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: poetry run python -m pytest tests/

  deploy:
    needs: build-test-lint
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install poetry
        run: pip install poetry poetry-dynamic-versioning[plugin]

      - name: Install dependencies
        run: poetry install

      - name: Build package
        run: poetry build

      - name: Show built package version
        run: ls -1 dist/

      - name: Publish to PyPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: poetry publish --no-interaction --username __token__ --password $POETRY_PYPI_TOKEN_PYPI
